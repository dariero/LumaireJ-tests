name: Start SUT
description: Checkout, setup, and start the System Under Test (LumaireJ)

inputs:
  repository:
    description: 'Repository to checkout (must be darie/LumaireJ)'
    required: false
    default: 'darie/LumaireJ'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.14'

runs:
  using: composite
  steps:
    - name: Validate repository input
      shell: bash
      run: |
        if [[ "${{ inputs.repository }}" != "darie/LumaireJ" ]]; then
          echo "::error::Invalid repository: ${{ inputs.repository }}. Only darie/LumaireJ is allowed."
          exit 1
        fi

    - name: Checkout SUT
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        repository: ${{ inputs.repository }}
        path: app

    - name: Restore SUT PDM cache
      uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.2.0
      with:
        key: pdm-app-${{ runner.os }}-${{ hashFiles('app/pdm.lock') }}
        restore-keys: pdm-app-
        path: |
          ~/.cache/pdm
          app/.venv

    - name: Setup PDM for SUT
      uses: pdm-project/setup-pdm@568ddd69406b30de1a4ec5361b94a2d940eb2e0f # v4.2
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install SUT deps
      working-directory: app
      shell: bash
      run: pdm install

    - name: Start SUT
      working-directory: app
      shell: bash
      run: |
        nohup pdm run dev > ../app_uvicorn.log 2>&1 &
        echo $! > ../sut.pid
        sleep 3

        # Verify process started
        if ! ps -p $(cat ../sut.pid) > /dev/null 2>&1; then
          echo "::error::SUT failed to start"
          cat ../app_uvicorn.log
          exit 1
        fi

    - name: Wait for HTTP server
      shell: bash
      run: |
        MAX_ATTEMPTS=45
        ATTEMPT=0
        BASE_URL="${BASE_URL:-http://localhost:8000}"
        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          if curl --silent --fail --max-time 2 "$BASE_URL/health" 2>/dev/null || \
             curl --silent --fail --max-time 2 "$BASE_URL" 2>/dev/null; then
            echo "✅ Server is ready!"
            exit 0
          fi
          ATTEMPT=$((ATTEMPT + 1))
          echo "Waiting for server... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
          sleep 2
        done
        echo "❌ Server failed to start within timeout"
        if [[ -f app_uvicorn.log ]]; then
          echo "=== SUT logs ==="
          tail -50 app_uvicorn.log
        fi
        exit 1
