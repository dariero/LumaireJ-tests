name: Run API & E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [run-tests]

permissions:
  contents: read

concurrency:
  group: api-e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:  # Setup job: prepare SUT and test environment
    name: Setup SUT and Test Environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: Checkout tests
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout SUT
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: dariero/LumaireJ
          path: app

      - name: Cache SUT PDM & venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: pdm-app-${{ runner.os }}-${{ hashFiles('app/pdm.lock') }}
          restore-keys: pdm-app-
          path: |
            ~/.cache/pdm
            app/.venv

      - name: Setup PDM for SUT
        uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0 # v4.4
        with:
          python-version: '3.14'

      - name: Install SUT deps
        working-directory: app
        run: pdm install

      - name: Cache test PDM & venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: pdm-test-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: pdm-test-
          path: |
            ~/.cache/pdm
            .venv

      - name: Setup PDM for tests
        uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0 # v4.4
        with:
          python-version: '3.14'

      - name: Install test deps
        run: pdm install -G dev

      - name: Cache Playwright browsers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: playwright-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: playwright-${{ runner.os }}-
          path: |
            ~/.cache/ms-playwright

      - name: Install Playwright browsers
        working-directory: tests
        run: pdm run playwright install chromium --with-deps

      - name: Setup Java
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b # v4.6.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Allure CLI
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: allure-2.34.1-${{ runner.os }}
          path: ~/.allure

      - name: Install Allure CLI
        run: |
          if [[ ! -f "$HOME/.allure/allure-2.34.1/bin/allure" ]]; then
            mkdir -p $HOME/.allure
            wget -q https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz -O allure.tgz
            # Verify checksum (SHA-256 for Allure 2.34.1)
            echo "df13c5883429edd5041a24d6d072a8944e65274d1d76a441fd45d2585511349a  allure.tgz" | sha256sum --check --strict
            tar -xzf allure.tgz -C $HOME/.allure
            rm allure.tgz
          fi
          echo "$HOME/.allure/allure-2.34.1/bin" >> $GITHUB_PATH

      - name: Verify setup
        run: |
          echo "✅ SUT dependencies installed"
          echo "✅ Test dependencies installed"
          echo "✅ Playwright browsers cached"
          echo "✅ Allure CLI cached"
          echo "Setup completed successfully"

  test-api:  # API tests job
    name: API Tests
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: Checkout tests
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Start SUT
        uses: ./.github/actions/start-sut

      - name: Restore test PDM cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: pdm-test-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: pdm-test-
          path: |
            ~/.cache/pdm
            .venv

      - name: Setup PDM for tests
        uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0 # v4.4
        with:
          python-version: '3.14'

      - name: Install test deps
        run: pdm install -G dev

      - name: Setup Java
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b # v4.6.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Restore Allure CLI cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: allure-2.34.1-${{ runner.os }}
          path: ~/.allure

      - name: Setup Allure CLI
        run: echo "$HOME/.allure/allure-2.34.1/bin" >> $GITHUB_PATH

      - name: Run API tests
        working-directory: tests
        run: pdm run pytest -m api -v --alluredir=allure-results-api --junitxml=junit-results-api.xml

      - name: Generate Allure Report
        if: always()
        working-directory: tests
        run: |
          if [[ -d allure-results-api && -n "$(ls -A allure-results-api)" ]]; then
            allure generate allure-results-api --clean -o allure-report-api || echo "::warning::Allure report generation failed"
          fi

      - name: Publish API Test Results
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5 # v1.9.1
        if: always()
        with:
          name: API Test Results
          path: tests/junit-results-api.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Allure artifacts
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: allure-report-api
          path: tests/allure-report-api
          if-no-files-found: ignore

      - name: Upload SUT logs
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: app-logs-api
          path: app_uvicorn.log
          if-no-files-found: ignore

      - name: Stop SUT
        if: always()
        run: |
          if [[ -f sut.pid ]]; then
            PID=$(cat sut.pid)
            if ps -p $PID > /dev/null 2>&1; then
              kill -TERM $PID 2>/dev/null || true
              sleep 2
              kill -KILL $PID 2>/dev/null || true
            fi
            rm -f sut.pid
          fi

  test-e2e:  # E2E tests job
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [setup, test-api]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BASE_URL: ${{ secrets.BASE_URL }}
      BROWSER: ${{ matrix.browser }}

    steps:
      - name: Checkout tests
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Start SUT
        uses: ./.github/actions/start-sut

      - name: Restore test PDM cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: pdm-test-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: pdm-test-
          path: |
            ~/.cache/pdm
            .venv

      - name: Setup PDM for tests
        uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0 # v4.4
        with:
          python-version: '3.14'

      - name: Install test deps
        run: pdm install -G dev

      - name: Restore Playwright browsers cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pdm.lock') }}
          restore-keys: playwright-${{ runner.os }}-${{ matrix.browser }}-
          path: |
            ~/.cache/ms-playwright

      - name: Install Playwright browsers
        working-directory: tests
        run: pdm run playwright install ${{ matrix.browser }} --with-deps

      - name: Setup Java
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b # v4.6.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Restore Allure CLI cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          key: allure-2.34.1-${{ runner.os }}
          path: ~/.allure

      - name: Setup Allure CLI
        run: echo "$HOME/.allure/allure-2.34.1/bin" >> $GITHUB_PATH

      - name: Run E2E tests
        working-directory: tests
        run: pdm run pytest -m e2e -v --alluredir=allure-results-e2e-${{ matrix.browser }} --junitxml=junit-results-e2e-${{ matrix.browser }}.xml --reruns=2 --reruns-delay=1

      - name: Generate Allure Report
        if: always()
        working-directory: tests
        run: |
          if [[ -d allure-results-e2e-${{ matrix.browser }} && -n "$(ls -A allure-results-e2e-${{ matrix.browser }})" ]]; then
            allure generate allure-results-e2e-${{ matrix.browser }} --clean -o allure-report-e2e-${{ matrix.browser }} || echo "::warning::Allure report generation failed"
          fi

      - name: Publish E2E Test Results
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5 # v1.9.1
        if: always()
        with:
          name: E2E Test Results (${{ matrix.browser }})
          path: tests/junit-results-e2e-${{ matrix.browser }}.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Allure artifacts
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: allure-report-e2e-${{ matrix.browser }}
          path: tests/allure-report-e2e-${{ matrix.browser }}
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: e2e-screenshots-${{ matrix.browser }}
          path: tests/screenshots/
          if-no-files-found: ignore

      - name: Upload failure traces
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: e2e-traces-${{ matrix.browser }}
          path: tests/traces/
          if-no-files-found: ignore

      - name: Upload SUT logs
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: app-logs-e2e-${{ matrix.browser }}
          path: app_uvicorn.log
          if-no-files-found: ignore

      - name: Stop SUT
        if: always()
        run: |
          if [[ -f sut.pid ]]; then
            PID=$(cat sut.pid)
            if ps -p $PID > /dev/null 2>&1; then
              kill -TERM $PID 2>/dev/null || true
              sleep 2
              kill -KILL $PID 2>/dev/null || true
            fi
            rm -f sut.pid
          fi

  report-status:  # Report status back to main repo
    name: Report status back to main repo
    runs-on: ubuntu-latest
    needs: [test-api, test-e2e]
    if: ${{ github.event_name == 'repository_dispatch' && !cancelled() }}
    env:
      API_RESULT: ${{ needs.test-api.result }}
      E2E_RESULT: ${{ needs.test-e2e.result }}
      HEAD_SHA: ${{ github.event.client_payload.sha }}
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      # TODO: Uncomment after configuring DISPATCH_SECRET in repository settings
      # - name: Validate dispatch secret
      #   run: |
      #     if [[ "${{ github.event.client_payload.secret }}" != "${{ secrets.DISPATCH_SECRET }}" ]]; then
      #       echo "::error::Invalid dispatch secret"
      #       exit 1
      #     fi

      - name: Validate HEAD_SHA
        run: |
          if [[ ! "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid SHA format: $HEAD_SHA"
            exit 1
          fi

      - name: Post commit status back to LumaireJ
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.PAT_FOR_MAIN_REPO }}
          script: |
            const apiResult = (process.env.API_RESULT || '').toLowerCase();
            const e2eResult = (process.env.E2E_RESULT || '').toLowerCase();

            // Determine overall status
            const allSuccess = apiResult === 'success' && e2eResult === 'success';
            const anyCancelled = apiResult === 'cancelled' || e2eResult === 'cancelled';

            const state = allSuccess ? 'success'
                        : anyCancelled ? 'failure'  // Treat cancelled as failure to unblock
                        : 'failure';

            let description = '';
            if (allSuccess) {
              description = 'All API/E2E tests passed ✅';
            } else if (anyCancelled) {
              description = 'Tests workflow was cancelled ⚠️';
            } else {
              const failed = [];
              if (apiResult !== 'success') failed.push('API');
              if (e2eResult !== 'success') failed.push('E2E');
              description = `Failed: ${failed.join(', ')} tests ❌`;
            }

            await github.rest.repos.createCommitStatus({
              owner: process.env.REPO_OWNER,
              repo: 'LumaireJ',
              sha: process.env.HEAD_SHA,
              state,
              context: 'API & E2E Tests',
              description
            });
